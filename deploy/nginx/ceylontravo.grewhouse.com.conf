server {
    listen 80;
    server_name ceylontravo.grewhouse.com;

    # Serve ACME challenge for certbot
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Proxy all other requests to the frontend container on host port 8081
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Optionally proxy API to backend (if you want same domain)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/ceylontravo.access.log;
    error_log /var/log/nginx/ceylontravo.error.log;
}
