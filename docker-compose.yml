version: '3.8'

services:
  # MySQL Database
  ceylontravo-db:
    image: mysql:8.0
    container_name: ceylontravo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ceylontravo}
      MYSQL_USER: ${DB_USER:-ceylontravo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ceylontravo123}
    ports:
      - "3307:3306"  # Non-conflicting port (avoiding 3306, 5432)
    volumes:
      - ceylontravo-db-data:/var/lib/mysql
    networks:
      - ceylontravo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  ceylontravo-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ceylontravo-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${DB_USER:-ceylontravo}:${DB_PASSWORD:-ceylontravo123}@ceylontravo-db:3306/${DB_NAME:-ceylontravo}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "3001:4000"  # Non-conflicting port (avoiding 3000)
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      ceylontravo-db:
        condition: service_healthy
    networks:
      - ceylontravo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend with Nginx
  ceylontravo-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    container_name: ceylontravo-frontend
    restart: unless-stopped
    ports:
      - "8081:80"  # Non-conflicting port (avoiding 8080)
    depends_on:
      - ceylontravo-backend
    networks:
      - ceylontravo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ceylontravo-db-data:
    name: ceylontravo-db-data

networks:
  ceylontravo-network:
    name: ceylontravo-network
    driver: bridge
